<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 172" role="img" aria-labelledby="pipeline-title pipeline-desc">
  <title id="pipeline-title">Evaluation pipeline</title>
  <desc id="pipeline-desc">
    Synthetic illusion and control stimuli are probed by eight vision models using family-specific protocols,
    filtered by control-pass quality, scored with HEAS, then optionally aligned on LLaVA (SymMPO).
  </desc>
  <defs>
    <marker id="pipe-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a5568"/>
    </marker>
  </defs>
  <style>
    .pipe-box { fill: #f7fafc; stroke: #2d3748; stroke-width: 1.5; }
    .pipe-box-dashed { fill: #faf5ff; stroke: #553c9a; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .pipe-title { font: 600 12.5px Inter, system-ui, sans-serif; fill: #1a202c; }
    .pipe-sub { font: 10.5px Inter, system-ui, sans-serif; fill: #4a5568; }
    .pipe-arrow { stroke: #4a5568; stroke-width: 1.5; fill: none; marker-end: url(#pipe-arrow); }
  </style>

  <!-- 1. Stimuli -->
  <rect class="pipe-box" x="8" y="38" width="130" height="96" rx="6"/>
  <text class="pipe-title" x="73" y="62" text-anchor="middle">1. Stimuli</text>
  <text class="pipe-sub" x="73" y="80" text-anchor="middle">Illusion + control</text>
  <text class="pipe-sub" x="73" y="96" text-anchor="middle">5 categories · sweeps</text>
  <text class="pipe-sub" x="73" y="112" text-anchor="middle">+ scene benchmarks</text>

  <line class="pipe-arrow" x1="138" y1="86" x2="158" y2="86"/>

  <!-- 2. Models -->
  <rect class="pipe-box" x="160" y="38" width="130" height="96" rx="6"/>
  <text class="pipe-title" x="225" y="62" text-anchor="middle">2. Models</text>
  <text class="pipe-sub" x="225" y="80" text-anchor="middle">8 architectures</text>
  <text class="pipe-sub" x="225" y="96" text-anchor="middle">CNN · ViT · CLIP</text>
  <text class="pipe-sub" x="225" y="112" text-anchor="middle">DINOv2 · VLM</text>

  <line class="pipe-arrow" x1="290" y1="86" x2="310" y2="86"/>

  <!-- 3. Probing -->
  <rect class="pipe-box" x="312" y="38" width="130" height="96" rx="6"/>
  <text class="pipe-title" x="377" y="62" text-anchor="middle">3. Probing</text>
  <text class="pipe-sub" x="377" y="80" text-anchor="middle">3-way response</text>
  <text class="pipe-sub" x="377" y="96" text-anchor="middle">linear / zero-shot</text>
  <text class="pipe-sub" x="377" y="112" text-anchor="middle">/ VLM MCQ</text>

  <line class="pipe-arrow" x1="442" y1="86" x2="462" y2="86"/>

  <!-- 4. Control filter -->
  <rect class="pipe-box" x="464" y="38" width="130" height="96" rx="6"/>
  <text class="pipe-title" x="529" y="62" text-anchor="middle">4. Filter</text>
  <text class="pipe-sub" x="529" y="80" text-anchor="middle">Control-pass only</text>
  <text class="pipe-sub" x="529" y="96" text-anchor="middle">(skip impossible</text>
  <text class="pipe-sub" x="529" y="112" text-anchor="middle">scene items)</text>

  <line class="pipe-arrow" x1="594" y1="86" x2="614" y2="86"/>

  <!-- 5. HEAS -->
  <rect class="pipe-box" x="616" y="38" width="130" height="96" rx="6"/>
  <text class="pipe-title" x="681" y="62" text-anchor="middle">5. HEAS</text>
  <text class="pipe-sub" x="681" y="80" text-anchor="middle">Illusory-rate</text>
  <text class="pipe-sub" x="681" y="96" text-anchor="middle">alignment per</text>
  <text class="pipe-sub" x="681" y="112" text-anchor="middle">category × model</text>

  <line class="pipe-arrow" x1="746" y1="86" x2="766" y2="86"/>

  <!-- 6. SymMPO alignment (LLaVA only) -->
  <rect class="pipe-box-dashed" x="768" y="38" width="130" height="96" rx="6"/>
  <text class="pipe-title" x="833" y="62" text-anchor="middle">6. SymMPO</text>
  <text class="pipe-sub" x="833" y="80" text-anchor="middle">Symmetric prefs</text>
  <text class="pipe-sub" x="833" y="96" text-anchor="middle">LLaVA → re-probe</text>
  <text class="pipe-sub" x="833" y="112" text-anchor="middle">(optional)</text>

  <!-- Supplementary analyses (not on main arrow path) -->
  <text class="pipe-sub" x="500" y="24" text-anchor="middle">
    Also reported: psychometric sweeps · label diagnostics · saliency maps
  </text>
</svg>
